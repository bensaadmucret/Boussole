<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boussole - Nouvelle Annonce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' },
            accent: { 500: '#f59e0b', 600: '#d97706' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-primary-900 text-white flex flex-col">
      <div class="p-6 flex items-center gap-3">
        <div class="w-8 h-8 bg-accent-500 rounded-lg flex items-center justify-center text-primary-900 font-bold">🧭</div>
        <span class="font-bold text-xl">Boussole</span>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-primary-800 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          <span>Tableau de bord</span>
        </a>
        <a href="listings.html" class="flex items-center gap-3 px-4 py-3 bg-primary-700 rounded-lg text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span>Annonces</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto">
      <header class="bg-white border-b px-8 py-4">
        <div class="flex items-center gap-4">
          <a href="listings.html" class="text-gray-500 hover:text-gray-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          </a>
          <h1 class="text-2xl font-bold text-gray-900">Nouvelle annonce</h1>
        </div>
      </header>

      <div class="p-8 max-w-4xl">
        <form class="space-y-6">
          <!-- URL de l'annonce -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Lien de l'annonce</label>
            <div class="flex gap-3">
              <input type="url" placeholder="https://linkedin.com/jobs/..." 
                class="flex-1 px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
              <button type="button" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition">
                Extraire auto
              </button>
            </div>
          </div>

          <!-- Informations principales -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-gray-900 mb-4">Informations principales</h2>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom de la société *</label>
                <input type="text" required
                  class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Titre du poste *</label>
                <input type="text" required
                  class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Localisation</label>
                <input type="text" placeholder="Paris, Lyon, Remote..."
                  class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Site de parution</label>
                <select class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                  <option>LinkedIn</option>
                  <option>Indeed</option>
                  <option>Welcome to the Jungle</option>
                  <option>Les Jeudis</option>
                  <option>Autre</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Contrat & Salaire -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-gray-900 mb-4">Contrat & Salaire</h2>
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Type de contrat</label>
                <select class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                  <option>CDI</option>
                  <option>CDD</option>
                  <option>Freelance</option>
                  <option>Stage</option>
                  <option>Alternance</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Télétravail</label>
                <select class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                  <option>Sur site</option>
                  <option>Hybride</option>
                  <option>Full remote</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Salaire</label>
                <div class="flex gap-2">
                  <input type="number" placeholder="Min"
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                  <span class="self-center text-gray-400">-</span>
                  <input type="number" placeholder="Max"
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
              </div>
            </div>
          </div>

          <!-- Stack technique -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-gray-900 mb-4">Stack technique</h2>
            <div class="flex flex-wrap gap-2 mb-3">
              <span class="px-3 py-1 bg-primary-100 text-primary-700 rounded-full text-sm flex items-center gap-2">
                React
                <button class="hover:text-primary-900">×</button>
              </span>
              <span class="px-3 py-1 bg-primary-100 text-primary-700 rounded-full text-sm flex items-center gap-2">
                TypeScript
                <button class="hover:text-primary-900">×</button>
              </span>
              <input type="text" placeholder="Ajouter une techno..." 
                class="px-3 py-1 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>
          </div>

          <!-- Description -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-gray-900 mb-4">Description complète</h2>
            <textarea rows="10" placeholder="Collez ici la description de l'annonce..."
              class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none"></textarea>
          </div>

          <!-- Actions -->
          <div class="flex justify-end gap-3">
            <a href="listings.html" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
              Annuler
            </a>
            <button type="submit" class="px-6 py-2 bg-accent-500 hover:bg-accent-600 text-white rounded-lg transition">
              Sauvegarder l'annonce
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
